databases:
  - name: ai-cpo-db
    plan: free
    databaseName: ai_cpo
    user: ai_cpo_user

services:
  - type: web
    name: ai-cpo-agent
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-cpo-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: JOB_SECRET
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.11
